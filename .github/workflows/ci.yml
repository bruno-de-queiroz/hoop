name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # sandbox's vitest also runs ../shared/**/*.test.ts (see its
        # vitest.config.ts include), so the shared package is covered here.
        package: [sandbox, dashboard]
    defaults:
      run:
        working-directory: plugins/hoop/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/hoop/${{ matrix.package }}/package-lock.json

      # better-sqlite3 (sandbox) compiles a native addon; ubuntu-latest ships
      # python3 + build-essential, so no extra system deps are needed.
      - name: Install dependencies
        run: npm ci

      # Only the dashboard has an ESLint config (next lint). The sandbox is a
      # plain TS service with no lint setup, so this step is dashboard-only.
      - name: Lint
        if: matrix.package == 'dashboard'
        run: npm run lint

      - name: Unit tests
        run: npm test
